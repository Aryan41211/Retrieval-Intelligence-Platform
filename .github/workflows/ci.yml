name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  PIP_NO_CACHE_DIR: "1"

jobs:
  # ---------------------------------------------------------------------------
  # Linting & formatting — full codebase. Pre-existing complexity warnings
  # in specific modules are suppressed via pyproject.toml per-file-ignores.
  # ---------------------------------------------------------------------------
  backend-lint:
    name: Backend lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linters
        run: pip install ruff==0.5.7 black==24.8.0 mypy==1.11.2
      - name: Ruff
        run: ruff check backend/
      - name: Black
        run: black --check backend/
      - name: MyPy
        run: mypy backend/

  # ---------------------------------------------------------------------------
  # Unit & integration tests. Heavy ML dependencies are installed from
  # requirements.txt; tests requiring external API keys are marked and skipped.
  # ---------------------------------------------------------------------------
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Unit tests
        run: pytest backend/tests/unit -m unit -q --cov=backend --cov-report=term-missing
      - name: Integration tests
        run: pytest backend/tests/integration -m integration -q

  # ---------------------------------------------------------------------------
  # Frontend tests, lint and build.
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Security scanning — blocks on findings. Run pip-audit with --fail-on-vuln
  # and bandit without || true so real issues fail the build.
  # ---------------------------------------------------------------------------
  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Dependency audit
        run: |
          pip install pip-audit==2.8.0
          pip-audit -r requirements.txt --fail-on-vuln
      - name: Static security analysis
        run: |
          pip install bandit==1.8.3
          bandit -r backend -x backend/tests -ll

  # ---------------------------------------------------------------------------
  # Build verification - produce a wheel/sdist.
  # ---------------------------------------------------------------------------
  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  # ---------------------------------------------------------------------------
  # Docker build verification.
  # ---------------------------------------------------------------------------
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: retrieval-intelligence-platform:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
